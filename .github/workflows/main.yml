name: Update News
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List Files (Debug)
        run: ls -R  # This will show us EXACTLY where your files are hidden

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install feedparser beautifulsoup4 requests

      - name: Run Bot
        run: python bot.py

      - name: Save Results
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add index.html
          git commit -m "Automated News Update" || echo "No changes to commit"
          git push
