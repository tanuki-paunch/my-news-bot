name: Update News
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and Run Bot
        run: |
          pip install feedparser beautifulsoup4 requests
          # This writes the python script directly to the runner
          cat << 'EOF' > runner_bot.py
          import feedparser
          from bs4 import BeautifulSoup
          import datetime

          KEYWORDS = ["AI", "Space", "Technology"]
          RSS_FEEDS = ["https://news.google.com/rss"]

          results = []
          for url in RSS_FEEDS:
              feed = feedparser.parse(url)
              for entry in feed.entries:
                  if any(key.lower() in entry.title.lower() for key in KEYWORDS):
                      results.append(f"<h3><a href='{entry.link}'>{entry.title}</a></h3>")
          
          content = "".join(results) if results else "<h3>No news found today.</h3>"
          with open("index.html", "w") as f:
              f.write(f"<html><body><h1>Daily News</h1>{content}</body></html>")
          EOF
          
          python runner_bot.py

      - name: Save to Page
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@noreply.github.com'
          git add index.html
          git commit -m "Update news" || exit 0
          git push
