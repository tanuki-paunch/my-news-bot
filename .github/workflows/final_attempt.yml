name: Final Attempt Bot
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Execute News Search
        run: |
          pip install feedparser beautifulsoup4 requests
          cat << 'EOF' > ghost_script.py
          import feedparser
          import datetime
          KEYWORDS = ["AI", "Tech", "Space"]
          # We use a reliable feed to ensure it works the first time
          feed = feedparser.parse("https://news.google.com/rss")
          articles = []
          for entry in feed.entries[:8]:
              articles.append(f"<li><a href='{entry.link}'>{entry.title}</a></li>")
          
          html = f"<html><body style='font-family:sans-serif;padding:40px;'><h1>News Update</h1><p>{datetime.datetime.now()}</p><ul>{''.join(articles)}</ul></body></html>"
          with open("index.html", "w") as f:
              f.write(html)
          EOF
          python ghost_script.py

      - name: Publish to Pages
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@noreply.github.com'
          git add index.html
          git commit -m "forced update" || exit 0
          git push
