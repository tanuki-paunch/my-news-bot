name: My Actual News Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run My Bot
        run: |
          pip install feedparser beautifulsoup4 requests
          python bot.py

      - name: Publish
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@noreply.github.com'
          git add index.html
          git commit -m "update with my keywords" || exit 0
          git push
