name: Ironclad News
on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate News
        run: |
          pip install feedparser
          python3 - <<'EOF'
          import feedparser
          import datetime

          # YOUR TARGET DATA
          KEYWORDS = ["Zorro Ranch", "Clementon"]
          RSS_FEEDS = [
              "https://news.google.com/rss", 
              "https://www.courierpostonline.com/arc/outboundfeeds/rss/", 
              "https://www.nj.com/arc/outboundfeeds/rss/", 
              "https://www.southjersey.com/rss", 
              "https://nmindepth.com/feed", 
              "https://www.koat.com/search-results-rss/762312/"
          ]
          
          results = []
          for url in RSS_FEEDS:
              try:
                  feed = feedparser.parse(url)
                  for entry in feed.entries:
                      if any(k.lower() in entry.title.lower() for k in KEYWORDS):
                          results.append(f"<li><a href='{entry.link}'>{entry.title}</a></li>")
              except:
                  continue
          
          # BUILD THE PAGE
          list_html = "".join(results) if results else "<li>No news found for those specific topics today.</li>"
          full_page = f"""
          <html>
          <body style='font-family:sans-serif; padding:50px; max-width:800px; margin:auto;'>
            <h1>Daily Briefing</h1>
            <p><small>Last updated: {datetime.datetime.now().strftime('%Y-%m-%d %H:%M')}</small></p>
            <ul>{list_html}</ul>
          </body>
          </html>
          """
          
          with open("index.html", "w") as f:
              f.write(full_page)
          EOF

      - name: Save
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add index.html
          git commit -m "Update with custom keywords" || exit 0
          git push
