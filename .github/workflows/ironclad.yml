name: Ironclad News
on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate News
        run: |
          pip install feedparser
          python3 - <<'EOF'
          import feedparser
          import datetime
          import urllib.parse

          KEYWORDS = ["Zorro Ranch", "Clementon"]
          
          # We are now searching Google News SPECIFICALLY for these terms
          results = []
          for key in KEYWORDS:
              query = urllib.parse.quote(key)
              search_url = f"https://news.google.com/rss/search?q={query}&hl=en-US&gl=US&ceid=US:en"
              
              try:
                  feed = feedparser.parse(search_url)
                  for entry in feed.entries[:5]: # Take top 5 for each keyword
                      results.append(f"<li><strong>[{key}]</strong> <a href='{entry.link}' target='_blank'>{entry.title}</a></li>")
              except:
                  continue
          
          list_html = "".join(results) if results else "<li>No specific mentions of Zorro Ranch or Clementon found in the last 24 hours.</li>"
          
          full_page = f"""
          <html>
          <body style='font-family:sans-serif; padding:50px; max-width:800px; margin:auto; line-height:1.6;'>
            <div style='background:white; padding:30px; border:1px solid #ddd; border-radius:8px;'>
              <h1>Targeted Briefing</h1>
              <p><small>Last updated: {datetime.datetime.now().strftime('%Y-%m-%d %H:%M')} UTC</small></p>
              <hr>
              <ul>{list_html}</ul>
            </div>
          </body>
          </html>
          """
          with open("index.html", "w") as f:
              f.write(full_page)
          EOF

      - name: Force Save
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add index.html
          git commit -m "Update Targeted News" || exit 0
          git pull --rebase origin main
          git push -f origin main
