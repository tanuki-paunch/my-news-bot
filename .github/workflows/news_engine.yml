name: News Engine
on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate News
        run: |
          python3 - <<EOF
          import urllib.request
          import datetime

          # YOUR TOPICS
          KEYWORDS = ["AI", "Space", "Cooking"]
          
          # THE FEED
          RSS_URL = "https://news.google.com/rss"
          
          try:
              # Fetch the data
              req = urllib.request.Request(RSS_URL, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req) as response:
                  data = response.read().decode('utf-8')
              
              # Extract items manually to avoid extra libraries
              items = data.split('<item>')[1:]
              found_stories = []
              
              for item in items:
                  title = item.split('<title>')[1].split('</title>')[0]
                  link = item.split('<link>')[1].split('</link>')[0]
                  
                  # Check for keywords
                  if any(k.lower() in title.lower() for k in KEYWORDS):
                      found_stories.append(f"<li><a href='{link}'>{title}</a></li>")
              
              # Build the HTML
              list_html = "".join(found_stories) if found_stories else "<li>No matches found today.</li>"
              full_html = f"<html><body style='font-family:sans-serif; padding:50px;'><h1>News Brief: {datetime.date.today()}</h1><ul>{list_html}</ul></body></html>"
              
              with open("index.html", "w") as f:
                  f.write(full_html)
              print("Success: index.html created.")
              
          except Exception as e:
              print(f"Error occurred: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add index.html
          git commit -m "Update News" || exit 0
          git push
