name: News Engine
on:
  workflow_dispatch:

jobs:
  run-bot: 
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate News
        run: |
          python3 - <<EOF
          import urllib.request
          import datetime

          # SIMPLE KEYWORDS
          KEYWORDS = ["AI", "Tech", "Space"]
          
          # Using a basic RSS fetch without external libraries
          url = "https://news.google.com/rss"
          try:
              response = urllib.request.urlopen(url)
              data = response.read().decode('utf-8')
              
              # Very basic manual parsing to avoid dependencies
              items = data.split('<item>')[1:]
              results = []
              
              for item in items:
                  title = item.split('<title>')[1].split('</title>')[0]
                  link = item.split('<link>')[1].split('</link>')[0]
                  if any(k.lower() in title.lower() for k in KEYWORDS):
                      results.append(f"<li><a href='{link}'>{title}</a></li>")
              
              content = "".join(results) if results else "<li>No matching news today.</li>"
              html = f"<html><body><h1>News: {datetime.datetime.now()}</h1><ul>{content}</ul></body></html>"
              
              with open("index.html", "w") as f:
                  f.write(html)
              print("Successfully created index.html")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add index.html
          git commit -m "Update News" || exit 0
          git push
