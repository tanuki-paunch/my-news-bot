name: News Engine
on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install feedparser beautifulsoup4 requests

      - name: Generate News
        run: |
          cat << 'EOF' > run_me.py
          import feedparser
          from bs4 import BeautifulSoup
          import datetime
          
          # EDIT THESE KEYWORDS RIGHT HERE
          KEYWORDS = ["Zorro Ranch", "Clementon"]
          RSS_FEEDS = ["https://news.google.com/rss", "courierpostonline.com/feed", "https://www.nj.com/rss/",  "southjersey.com/rss", "https://nmindepth.com/feed",  "https://www.koat.com/article/rss/3618299"]
          
          results = []
          for url in FEEDS:
              f = feedparser.parse(url)
              for e in f.entries:
                  if any(k.lower() in e.title.lower() for k in KEYWORDS):
                      results.append(f"<li><a href='{e.link}'>{e.title}</a></li>")
          
          html = f"<html><body><h1>News Brief: {datetime.datetime.now().strftime('%Y-%m-%d')}</h1><ul>"
          html += "".join(results) if results else "<li>No stories found today.</li>"
          html += "</ul></body></html>"
          
          with open("index.html", "w") as f:
              f.write(html)
          EOF
          python run_me.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add index.html
          git commit -m "Update News" || exit 0
          git push
